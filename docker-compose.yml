services:
  whisper:
    image: ttl.sh/loggerbot-whisper:24h
    environment:
      MODEL_SIZE: ${MODEL_SIZE:-base}
      GRPC_PORT: "50051"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost', 50051)); s.close(); print('ok')\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  bot:
    image: ttl.sh/loggerbot:24h
    depends_on:
      whisper:
        condition: service_healthy
    environment:
      TELEGRAM_API_TOKEN: ${TELEGRAM_API_TOKEN}
      WHISPER_ADDR: whisper:50051
      DB_PATH: /data/log.db
    volumes:
      - loggerbot-data:/data
    restart: unless-stopped

volumes:
  loggerbot-data: